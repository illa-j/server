# Docker Compose for AWS EC2 deployment
# Uses bind-mount to EBS volume at /mnt/fts for persistent data.
# Usage: docker compose -f compose.ec2.yaml up -d

services:
  freetakserver:
    image: freetakserver:latest
    pull_policy: build
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - FTS_DATA_PATH=/mnt/fts
    mem_limit: 1.5g
    memswap_limit: 3g
    volumes:
      - /mnt/fts:/mnt/fts
    ports:
      # DataPackagePort
      - 8080:8080
      # CoTPort
      - 8087:8087
      # SSLCoTPort
      - 8089:8089
      # SSLDataPackagePort
      - 8443:8443
      # FederationPort
      #- 9000:9000
      # APIPort / Web UI — accessible at http://<EC2_PUBLIC_IP>:19023
      - 19023:19023
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/')"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
