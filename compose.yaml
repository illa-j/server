services:
  freetakserver:
    image: freetakserver:latest
    pull_policy: build
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    volumes:
      - free-tak-core-db:/opt/fts/
    ports:
      # DataPackagePort
      - 8080:8080
      # CoTPort
      - 8087:8087
      # SSLCoTPort
      - 8089:8089
      # SSLDataPackagePort
      - 8443:8443
      # FederationPort
      #- 9000:9000
      # APIPort - Don't expose by default
      #- 19023:19023

volumes:
  free-tak-core-db:
